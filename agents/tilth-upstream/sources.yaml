# Manifest read by scripts/tilth-upstream-scan and agents/tilth-upstream/routine.md.
# Edit this file to change scan scope or thresholds; the scanner has no
# hardcoded paths of its own.

fork: paulnsorensen/tilth
upstream: jahala/tilth
default_branch: main

# Only files matching one of these globs (and not excluded below) can ever
# become part of a candidate. This is the primary privacy/correctness guard —
# a file outside this list is never inspected for upstreaming.
upstreamable_globs:
  - "src/**"
  - "fuzz/**"
  - "benchmark/**"
  - "Cargo.toml"
  - "Cargo.lock"
  - "install.sh"
  - "README.md"
  - "ARCHITECTURE.md"
  - "CONTRIBUTING.md"
  - "SECURITY.md"

# Fork-only meta that must NEVER be upstreamed, checked before the allowlist
# above. A commit touching any of these paths is rejected outright, even if
# it also touches an upstreamable path.
exclude_globs:
  - ".cheese/**"
  - ".claude/**"
  - ".claude-plugin/**"
  - ".hallouminate/**"
  - ".serena/**"
  - "agents/**"
  - "skills/**"
  - "prompts/**"

# "Easy" candidate thresholds — a candidate exceeding either is still
# reported (so the roadmap can track it) but not marked `easy`, and the
# routine never opens a PR for it unattended.
max_candidate_files: 5
max_candidate_lines: 150

contrib_branch_prefix: "contrib/"
sync_branch: "sync/upstream"
roadmap_path: ".hallouminate/wiki/roadmaps/upstream-contrib"
jan_email_env: "JAN_EMAIL"
dedup_label: "tilth-upstream"
