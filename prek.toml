# prek hooks — local pre-commit enforcement for tilth
# Run: prek install
# To skip hooks for a commit: git commit --no-verify (not recommended)

[install]
use_framework = false  # We use prek, not the pre-commit framework

[[hooks]]
id = "markdown-lint"
name = "Markdown lint and auto-fix"
entry = "markdownlint-cli2 --fix --config .markdownlint.json"
language = "node"
files = '\.(md)$'
stages = ["commit"]
additional_dependencies = ["markdownlint-cli2"]

[[hooks]]
id = "cargo-fmt"
name = "Cargo format check"
entry = "cargo fmt --"
language = "system"
files = '\.(rs)$'
stages = ["commit"]

[[hooks]]
id = "cargo-clippy"
name = "Cargo clippy lints"
entry = "cargo clippy --all-targets --all-features -- -D warnings"
language = "system"
files = '\.(rs)$'
stages = ["commit"]
pass_filenames = false
